zeroTrue: &a3
  score: 0
  countWords: true
zeroFalse: &a4
  score: 0
  countWords: false
oneTrue: &a1
  score: 1
  countWords: true
oneFalse: &a2
  score: 1
  countWords: false
tcrHtmlConfig: &a5
  a: *a1
  code: *a2
  img: *a2
  h1: *a1
  h2: *a1
  h3: *a1
  h4: *a1
  h5: *a1
  h6: *a1
  br: *a3
  p: *a3
  em: *a3
  ul: *a3
  td: *a3
  hr: *a3
  ol: *a3
  pre: *a4
  strong: *a4
  blockquote: *a4
  li:
    score: 0.1
    countWords: true
plugins:
  - uses:
      - plugin: https://ubiquity-os-command-start-stop-main.ubiquity.workers.dev
        skipBotEvents: false
        with:
          reviewDelayTolerance: 3 Days
          taskStaleTimeoutDuration: 30 Days
          startRequiresWallet: true
          maxConcurrentTasks:
            collaborator: 2
            contributor: 2
          emptyWalletText: Please set your wallet address with the /wallet command first
            and try again.
          rolesWithReviewAuthority:
            - COLLABORATOR
            - OWNER
            - MEMBER
            - ADMIN
          requiredLabelsToStart:
            - name: "Priority: 1 (Normal)"
              allowedRoles:
                - collaborator
                - contributor
            - name: "Priority: 2 (Medium)"
              allowedRoles:
                - collaborator
                - contributor
            - name: "Priority: 3 (High)"
              allowedRoles:
                - collaborator
            - name: "Priority: 4 (Urgent)"
              allowedRoles:
                - collaborator
            - name: "Priority: 5 (Emergency)"
              allowedRoles:
                - collaborator
          assignedIssueScope: org
  - uses:
      - plugin: https://ubiquity-os-command-wallet-main.ubiquity.workers.dev
        with:
          registerWalletWithVerification: false
  - uses:
      - plugin: ubiquity-os-marketplace/command-ask@main
        with:
          model: openai/o1-mini
          openAiBaseUrl: https://openrouter.ai/api/v1
          similarityThreshold: 0.9
          maxTokens: 10000
  - uses:
      - plugin: https://ubiquity-os-command-query-user-main.ubiquity.workers.dev
        with:
          allowPublicQuery: true
  - uses:
      - plugin: https://ubiquity-os-daemon-pricing-main.ubiquity.workers.dev
        with:
          labels:
            time:
              - name: "Time: <15 Minutes"
                collaboratorOnly: false
              - name: "Time: <1 Hour"
                collaboratorOnly: false
              - name: "Time: <2 Hours"
                collaboratorOnly: false
              - name: "Time: <4 Hours"
                collaboratorOnly: false
              - name: "Time: <1 Day"
                collaboratorOnly: false
              - name: "Time: <1 Week"
                collaboratorOnly: false
            priority:
              - name: "Priority: 0 (Regression)"
                collaboratorOnly: false
              - name: "Priority: 1 (Normal)"
                collaboratorOnly: false
              - name: "Priority: 2 (Medium)"
                collaboratorOnly: false
              - name: "Priority: 3 (High)"
                collaboratorOnly: false
              - name: "Priority: 4 (Urgent)"
                collaboratorOnly: false
              - name: "Priority: 5 (Emergency)"
                collaboratorOnly: false
          basePriceMultiplier: 2
          shouldFundContributorClosedIssue: false
  - skipBotEvents: false
    uses:
      - plugin: ubiquity-os-marketplace/text-conversation-rewards@main
        with:
          logLevel: debug
          evmNetworkId: 100
          evmPrivateEncrypted: bd5AFnSCO6c5jJyPifpOfr5Zys29RE7SyXkEU3akT13RtGmYDrqGIGuvJQyH53HA5dIba7PL5bXfll0JebmwXYe5gHIXSGX80WuGMDHh0cFfeGjHhmUXe8kkZ1OT2De9qRpqejJcEzdfi-8XNAvP7cQu2Vt-7RNnPw
          erc20RewardToken: "0xC6ed4f520f6A4e4DC27273509239b7F8A68d2068"
          incentives:
            contentEvaluator:
              enabled: true
              openAi:
                model: openai/gpt-4o-2024-11-20
                tokenCountLimit: 124000
                endpoint: https://openrouter.ai/api/v1
              multipliers:
                - role:
                    - ISSUE_SPECIFICATION
                  relevance: 1
            userExtractor:
              enabled: true
              redeemTask: true
            dataPurge:
              enabled: true
              skipCommentsWhileAssigned: all
            formattingEvaluator:
              multipliers:
                - role:
                    - ISSUE_SPECIFICATION
                    - ISSUE_AUTHOR
                    - ISSUE_COLLABORATOR
                    - PULL_COLLABORATOR
                  multiplier: 1
                  rewards:
                    wordValue: 0.1
                    html: *a5
                - role:
                    - ISSUE_CONTRIBUTOR
                    - ISSUE_ASSIGNEE
                  multiplier: 0.25
                  rewards:
                    wordValue: 0.1
                    html: *a5
                - role:
                    - PULL_AUTHOR
                    - PULL_CONTRIBUTOR
                    - PULL_ASSIGNEE
                    - PULL_SPECIFICATION
                  multiplier: 0
                  rewards:
                    wordValue: 0
                    html: *a5
            permitGeneration: {}
            githubComment:
              post: true
              debug: false
          dataCollection:
            maxAttempts: 10
            delayMs: 1000
          requirePriceLabel: true
          limitRewards: true
          collaboratorOnlyPaymentInvocation: true
  - skipBotEvents: false
    testUbqKey: 1234
    uses:
      - plugin: ubiquity-os-marketplace/daemon-disqualifier@main
        skipBotEvents: false
        with:
          warning: 7 days
          pullRequestRequired: true
          eventWhitelist:
            - pull_request.review_requested
            - pull_request.ready_for_review
            - pull_request_review_comment.created
            - issue_comment.created
            - push
          watch:
            optOut:
              - ubiquibot
              - launch-party
              - staging
              - production
          disqualification: 14 days
          prioritySpeed: true
  - uses:
      - plugin: ubiquity-os-marketplace/daemon-merging@main
        with:
          approvalsRequired:
            collaborator: 1
            contributor: 2
          mergeTimeout:
            collaborator: 3.5 days
            contributor: 7 days
          repos:
            monitor: []
            ignore:
              - ubiquibot
              - launch-party
              - staging
              - production
          allowedReviewerRoles:
            - COLLABORATOR
            - MEMBER
            - OWNER
  - uses:
      - plugin: https://ubiquity-os-comment-vector-embeddings-main.ubiquity.workers.dev
        with:
          matchThreshold: 0.95
          warningThreshold: 0.75
          jobMatchingThreshold: 0.75
          alwaysRecommend: 0
  - uses:
      - plugin: ubiquity-os-marketplace/daemon-pull-review@main
  - uses:
      - plugin: https://command-config-development.deno.dev
        with:
          baseUrl: https://openrouter.ai/api/v1
          parserPath: https://github.com/ubiquity-os/ubiquity-os-kernel.git
          configPath: .github/.ubiquity-os.config.yml
          devConfigPath: .github/.ubiquity-os.config.dev.yml
          defaultTargets:
            - name: https://github.com/ubiquity-os/.ubiquity-os.git
              type: dev
