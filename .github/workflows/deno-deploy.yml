name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: pay-ubq-fi
      entrypoint: serve.ts
      bun_version: 1.2.x
      deno_version: 2.x
      install_command: |
        cd frontend && bun install
      build_command: |
        cd frontend
        bun run build
      build_env: |
        VITE_SUPABASE_URL=$SUPABASE_URL
        VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      runtime_env: |
        STATIC_DIR=frontend/dist
      include: |
        frontend/dist/**
      exclude: |
        .git
        .github
        node_modules
        coverage
        .turbo
        .next
        .vercel
      debug_fetch_fail: true
    secrets:
      DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
