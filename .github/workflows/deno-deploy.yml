name: Deno Deploy

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: ubiquity/deno-deploy-workflow/.github/workflows/deno-deploy-reusable.yml@main
    with:
      project: pay-ubq-fi
      entrypoint: serve.ts
      deno_version: v2.6.x
      bun_version: 1.3.4
      install_command: |
        bun install
        # Work around transient deployctl/Deno HTTP failures in CI:
        # "TypeError: error reading a body from connection"
        if [ -x "${HOME}/.deno/bin/deployctl" ] && [ ! -x "${HOME}/.deno/bin/deployctl-real" ]; then
          mv "${HOME}/.deno/bin/deployctl" "${HOME}/.deno/bin/deployctl-real"
          cat > "${HOME}/.deno/bin/deployctl" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail
        
        real="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/deployctl-real"
        if [ ! -x "$real" ]; then
          echo "deployctl wrapper: missing $real" >&2
          exit 127
        fi
        
        max_attempts=5
        attempt=1
        
        while true; do
          set +e
          output=$("$real" "$@" 2>&1)
          status=$?
          set -e
        
          if [ "$status" -eq 0 ]; then
            printf '%s\n' "$output"
            exit 0
          fi
        
          if printf '%s\n' "$output" | grep -qi "error reading a body from connection"; then
            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_for=$(( attempt * 10 ))
              echo "::warning::deployctl transient network error (attempt ${attempt}/${max_attempts}); retrying in ${sleep_for}s"
              sleep "$sleep_for"
              attempt=$(( attempt + 1 ))
              continue
            fi
          fi
        
          printf '%s\n' "$output" >&2
          exit "$status"
        done
        EOF
          chmod +x "${HOME}/.deno/bin/deployctl"
        fi
      build_command: |
        bun run build
      build_env: |
        VITE_SUPABASE_URL=$SUPABASE_URL
        VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      forward_all_secrets: true
      runtime_env: |
        STATIC_DIR=dist
      include: |
        dist/**
      exclude: |
        .git
        .github
        node_modules
        coverage
        .turbo
        .next
        .vercel
      debug_fetch_fail: true
      required_env: |
        DENO_DEPLOY_TOKEN
        SUPABASE_URL
        SUPABASE_SERVICE_ROLE_KEY
        SUPABASE_ANON_KEY
    secrets: inherit
